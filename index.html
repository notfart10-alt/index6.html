<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flygradar Sweden</title>
    <style>
        :root {
            --bg: #0a0e12;
            --accent: #00d4aa;
            --card: #12171f;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: #e0f2f1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: var(--card);
            padding: 40px 50px;
            border-radius: 16px;
            width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(0, 212, 170, 0.2);
        }
        .logo {
            font-size: 28px;
            margin-bottom: 25px;
            color: var(--accent);
            font-weight: bold;
        }
        .choice-buttons {
            display: flex;
            gap: 12px;
            margin: 25px 0;
        }
        .choice-btn {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            border-radius: 10px;
            cursor: pointer;
        }
        .choice-btn.active {
            background: var(--accent);
            color: black;
        }
        input {
            width: 100%;
            padding: 13px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid rgba(0,212,170,0.4);
            background: #1e2a36;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-container" id="loginScreen">
        <div class="logo">FLYGRADAR SWEDEN</div>
        <h2>Välkommen</h2>

        <div class="choice-buttons">
            <button class="choice-btn active" id="btnLogin" onclick="showLogin()">Logga in</button>
            <button class="choice-btn" id="btnRegister" onclick="showRegister()">Skapa konto</button>
        </div>

        <!-- Logga in -->
        <div id="loginForm">
            <input type="text" id="loginUser" placeholder="Användarnamn" autocomplete="username">
            <input type="password" id="loginPass" placeholder="Lösenord" autocomplete="current-password">
            <button onclick="login()">Logga in</button>
        </div>

        <!-- Skapa konto -->
        <div id="registerForm" class="hidden">
            <input type="email" id="regEmail" placeholder="Emailadress">
            <input type="text" id="regUser" placeholder="Användarnamn">
            <input type="password" id="regPass" placeholder="Lösenord">
            <button onclick="register()">Skapa konto</button>
        </div>
    </div>

    <!-- Huvudsidan efter inloggning -->
    <div id="mainApp" style="display:none; width:100%; height:100vh; flex-direction:column;">
        <header style="background: linear-gradient(to right, #001f1a, #002b24); padding:15px 30px; display:flex; align-items:center;">
            <h1 style="margin:0;">Flygradar Sweden</h1>
        </header>

        <div style="display:flex; flex:1;">
            <!-- Meny -->
            <div style="width:250px; background:#0d141b; padding:20px 15px;">
                <button onclick="showPage('hem')" style="width:100%; padding:14px; margin:8px 0; background:transparent; border:none; color:#ddd; text-align:left; border-radius:8px;">Hem</button>
                <button onclick="showPage('karta')" style="width:100%; padding:14px; margin:8px 0; background:transparent; border:none; color:#ddd; text-align:left; border-radius:8px;">Karta</button>
                <button onclick="showPage('atc')" style="width:100%; padding:14px; margin:8px 0; background:transparent; border:none; color:#ddd; text-align:left; border-radius:8px;">ATC ESOE</button>
                <button onclick="showPage('installningar')" style="width:100%; padding:14px; margin:8px 0; background:transparent; border:none; color:#ddd; text-align:left; border-radius:8px;">Inställningar</button>
                <button onclick="logout()" style="width:100%; padding:14px; margin:8px 0; background:transparent; border:none; color:#ff7777; text-align:left; border-radius:8px;">Logga ut</button>
            </div>

            <!-- Innehåll -->
            <div style="flex:1; padding:30px; overflow:auto;">
                <div id="hem" class="page"> <h2>Välkommen till Flygradar Sweden</h2> </div>
                <div id="karta" class="page hidden">
                    <h2>Karta</h2>
                    <iframe id="mapFrame" src="https://globe.adsbexchange.com/" style="width:100%; height:85vh; border:none; border-radius:12px;"></iframe>
                </div>
                <div id="atc" class="page hidden">
                    <h2>ATC - ESOE Örebro</h2>
                    <p><strong>Frekvens:</strong> 120.275 MHz</p>
                    <audio controls style="width:100%; margin:20px 0;">
                        <source src="https://livestream.liveatc.net/ESOE" type="audio/mpeg">
                    </audio>
                </div>
                <div id="installningar" class="page hidden">
                    <h2>Inställningar</h2>
                    <p>Kommer fler inställningar snart.</p>
                </div>
            </div>
        </div>
    </div>

<script>
    function showLogin() {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('btnLogin').classList.add('active');
        document.getElementById('btnRegister').classList.remove('active');
    }

    function showRegister() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('btnLogin').classList.remove('active');
        document.getElementById('btnRegister').classList.add('active');
    }

    function register() {
        const email = document.getElementById('regEmail').value.trim();
        const user = document.getElementById('regUser').value.trim();
        const pass = document.getElementById('regPass').value.trim();

        if (!email || !user || !pass) {
            alert("Alla fält måste fyllas i");
            return;
        }

        localStorage.setItem('fr_email', email);
        localStorage.setItem('fr_user', user);
        localStorage.setItem('fr_pass', pass);

        alert("Konto skapat framgångsrikt!\n\nDu kan nu logga in.");
        showLogin();
        
        // Rensa registerfälten
        document.getElementById('regEmail').value = '';
        document.getElementById('regUser').value = '';
        document.getElementById('regPass').value = '';
    }

    function login() {
        const inputUser = document.getElementById('loginUser').value.trim();
        const inputPass = document.getElementById('loginPass').value.trim();

        const savedUser = localStorage.getItem('fr_user');
        const savedPass = localStorage.getItem('fr_pass');

        if (inputUser === savedUser && inputPass === savedPass && savedUser && savedPass) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            showPage('hem');
        } else {
            alert("Fel användarnamn eller lösenord.\nKontrollera att du skrivit rätt.");
        }
    }

    function logout() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
    }

    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(page).classList.remove('hidden');
    }

    // Startläge
    showLogin();
</script>

</body>
</html>
