<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flygradar Sweden</title>
    <style>
        :root {
            --bg: #0a0e12;
            --accent: #00d4aa;
            --card: #12171f;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: #e0f2f1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .login-container {
            background: var(--card);
            padding: 40px 50px;
            border-radius: 16px;
            width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(0, 212, 170, 0.2);
        }
        .logo {
            font-size: 28px;
            margin-bottom: 30px;
            color: var(--accent);
        }
        .choice-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .choice-btn {
            flex: 1;
            padding: 16px;
            font-size: 17px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .choice-btn:hover, .choice-btn.active {
            background: var(--accent);
            color: black;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 170, 0.4);
            background: #1e2a36;
            color: white;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .hidden { display: none !important; }
        .main-app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <!-- Inloggningsskärm -->
    <div class="login-container" id="loginScreen">
        <div class="logo">Flygradar Sweden</div>
        <h2>Välkommen</h2>
        <p style="margin-bottom:25px; color:#aaa;">Välj ett alternativ nedan</p>

        <div class="choice-buttons">
            <button class="choice-btn active" id="btnLogin" onclick="showLoginForm()">Logga in</button>
            <button class="choice-btn" id="btnRegister" onclick="showRegisterForm()">Skapa konto</button>
        </div>

        <!-- Logga in formulär -->
        <div id="loginForm">
            <div class="form-group">
                <input type="text" id="loginUser" placeholder="Användarnamn">
            </div>
            <div class="form-group">
                <input type="password" id="loginPass" placeholder="Lösenord">
            </div>
            <button onclick="login()">Logga in</button>
        </div>

        <!-- Skapa konto formulär -->
        <div id="registerForm" class="hidden">
            <div class="form-group">
                <input type="email" id="regEmail" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="text" id="regUser" placeholder="Användarnamn">
            </div>
            <div class="form-group">
                <input type="password" id="regPass" placeholder="Lösenord">
            </div>
            <button onclick="register()">Skapa konto</button>
        </div>
    </div>

    <!-- Huvudapplikationen (syns efter inloggning) -->
    <div class="main-app" id="mainApp">
        <!-- Här lägger vi in sidomeny + innehåll som tidigare -->
        <header style="background: linear-gradient(to right, #001f1a, #002b24); padding: 15px 25px; display: flex; align-items: center; gap: 15px;">
            <h1 style="margin:0; font-size:24px;">Flygradar Sweden</h1>
        </header>

        <div style="display:flex; flex:1; overflow:hidden;">
            <!-- Sidomeny -->
            <div style="width:240px; background:#0d141b; padding:20px;">
                <button class="nav-btn active" onclick="showPage('hem')">Hem</button>
                <button class="nav-btn" onclick="showPage('karta')">Karta</button>
                <button class="nav-btn" onclick="showPage('atc')">ATC ESOE</button>
                <button class="nav-btn" onclick="showPage('installningar')">Inställningar</button>
                <button class="nav-btn" onclick="logout()" style="color:#ff7777;">Logga ut</button>
            </div>

            <!-- Innehåll -->
            <div style="flex:1; padding:25px; overflow:auto;">
                <div id="hem" class="page">
                    <h2>Välkommen till Flygradar Sweden</h2>
                    <p>Din personliga svenska flygportal.</p>
                </div>
                <div id="karta" class="page hidden">
                    <h2>Karta</h2>
                    <iframe id="mapFrame" src="https://globe.adsbexchange.com/" style="width:100%; height:82vh; border:none; border-radius:12px;"></iframe>
                </div>
                <div id="atc" class="page hidden">
                    <h2>ATC - ESOE Örebro</h2>
                    <p><strong>Tower:</strong> 120.275 MHz</p>
                    <audio controls style="width:100%; margin:20px 0;">
                        <source src="https://livestream.liveatc.net/ESOE" type="audio/mpeg">
                    </audio>
                </div>
                <div id="installningar" class="page hidden">
                    <h2>Inställningar</h2>
                    <!-- Du kan lägga till tema och kartval här senare -->
                </div>
            </div>
        </div>
    </div>

<script>
    function showLoginForm() {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('btnLogin').classList.add('active');
        document.getElementById('btnRegister').classList.remove('active');
    }

    function showRegisterForm() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('btnLogin').classList.remove('active');
        document.getElementById('btnRegister').classList.add('active');
    }

    function register() {
        const email = document.getElementById('regEmail').value.trim();
        const user = document.getElementById('regUser').value.trim();
        const pass = document.getElementById('regPass').value.trim();

        if (!email || !user || !pass) {
            alert("Alla fält måste fyllas i");
            return;
        }

        localStorage.setItem('fr_user', user);
        localStorage.setItem('fr_pass', pass);
        localStorage.setItem('fr_email', email);

        alert("Konto skapat! Du kan nu logga in.");
        showLoginForm();
    }

    function login() {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();

        const savedUser = localStorage.getItem('fr_user');
        const savedPass = localStorage.getItem('fr_pass');

        if (user && pass && user === savedUser && pass === savedPass) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            showPage('hem');
        } else {
            alert("Fel användarnamn eller lösenord");
        }
    }

    function logout() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
    }

    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        const activePage = document.getElementById(page);
        if (activePage) activePage.classList.remove('hidden');
    }

    // Starta med inloggningssidan
    showLoginForm();
</script>

</body>
</html>
