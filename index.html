<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flygradar Sweden</title>
    <style>
        :root {
            --bg: #0a0e12;
            --accent: #00d4aa;
            --card: #12171f;
            --text: #e0f2f1;
        }
        [data-theme="blue"] {
            --bg: #0a0f1a;
            --accent: #00aaff;
            --card: #0f1a2a;
        }
        [data-theme="dark"] {
            --bg: #050505;
            --accent: #00cc99;
            --card: #1a1a1a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        .login-container {
            background: var(--card);
            padding: 40px 50px;
            border-radius: 16px;
            width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(0, 212, 170, 0.2);
        }
        .logo { 
            font-size: 28px; 
            margin-bottom: 25px; 
            color: var(--accent); 
            font-weight: bold; 
        }
        .choice-buttons { display: flex; gap: 12px; margin: 25px 0; }
        .choice-btn {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            border-radius: 10px;
            cursor: pointer;
        }
        .choice-btn.active {
            background: var(--accent);
            color: black;
        }
        input, select {
            width: 100%;
            padding: 13px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid rgba(0,212,170,0.4);
            background: #1e2a36;
            color: white;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .hidden { display: none !important; }

        /* Huvudlayout */
        #mainApp { display: none; flex-direction: column; height: 100vh; }
        header {
            background: linear-gradient(to right, #001f1a, #002b24);
            padding: 15px 25px;
            display: flex;
            align-items: center;
        }
        .content-wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 260px;
            background: #0d141b;
            padding: 20px 15px;
            border-right: 1px solid rgba(0,212,170,0.2);
        }
        .nav-btn {
            width: 100%;
            padding: 15px 20px;
            margin: 6px 0;
            background: transparent;
            border: none;
            color: #b0c4c1;
            text-align: left;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .nav-btn:hover, .nav-btn.active {
            background: var(--accent);
            color: black;
        }
        .main-content {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }
        iframe {
            width: 100%;
            height: 85vh;
            border: none;
            border-radius: 12px;
        }
    </style>
</head>
<body data-theme="default">

    <!-- Inloggning -->
    <div class="login-container" id="loginScreen">
        <div class="logo">FLYGRADAR SWEDEN</div>
        <h2>Välkommen</h2>

        <div class="choice-buttons">
            <button class="choice-btn active" id="btnLogin" onclick="showLogin()">Logga in</button>
            <button class="choice-btn" id="btnRegister" onclick="showRegister()">Skapa konto</button>
        </div>

        <div id="loginForm">
            <input type="text" id="loginUser" placeholder="Användarnamn">
            <input type="password" id="loginPass" placeholder="Lösenord">
            <button onclick="login()">Logga in</button>
        </div>

        <div id="registerForm" class="hidden">
            <input type="email" id="regEmail" placeholder="Emailadress">
            <input type="text" id="regUser" placeholder="Användarnamn">
            <input type="password" id="regPass" placeholder="Lösenord">
            <button onclick="register()">Skapa konto</button>
        </div>
    </div>

    <!-- Huvudprogram -->
    <div id="mainApp">
        <header>
            <h1 style="margin:0;">Flygradar Sweden</h1>
        </header>

        <div class="content-wrapper">
            <div class="sidebar">
                <button class="nav-btn active" onclick="showPage('hem')">Hem</button>
                <button class="nav-btn" onclick="showPage('karta')">Karta</button>
                <button class="nav-btn" onclick="showPage('atc')">ATC ESOE</button>
                <button class="nav-btn" onclick="showPage('installningar')">Inställningar</button>
                <button class="nav-btn" onclick="logout()" style="color:#ff7777;">Logga ut</button>
            </div>

            <div class="main-content">
                <div id="hem" class="page">
                    <h2>Välkommen till Flygradar Sweden</h2>
                    <p>Din personliga svenska flyg- och ATC-portal.</p>
                </div>

                <div id="karta" class="page hidden">
                    <h2>Karta</h2>
                    <iframe id="mapFrame" src="https://globe.adsbexchange.com/"></iframe>
                </div>

                <div id="atc" class="page hidden">
                    <h2>ATC - ESOE Örebro</h2>
                    <p><strong>Tower / Approach:</strong> 120.275 MHz</p>
                    <audio controls style="width:100%; margin:20px 0;">
                        <source src="https://livestream.liveatc.net/ESOE" type="audio/mpeg">
                    </audio>
                </div>

                <!-- Inställningar -->
                <div id="installningar" class="page hidden">
                    <h2>Inställningar</h2>
                    <div style="background:var(--card); padding:25px; border-radius:12px;">
                        <h3>Kartkälla</h3>
                        <select id="mapSelect" onchange="changeMap()" style="margin-bottom:25px;">
                            <option value="https://globe.adsbexchange.com/">ADS-B Exchange</option>
                            <option value="https://www.flightradar24.com/">Flightradar24</option>
                        </select>

                        <h3>Tema</h3>
                        <select id="themeSelect" onchange="changeTheme()">
                            <option value="default">Standard (Grön)</option>
                            <option value="blue">Blå Aviation</option>
                            <option value="dark">Mörk</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    // Inloggningssystem
    function showLogin() {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('btnLogin').classList.add('active');
        document.getElementById('btnRegister').classList.remove('active');
    }

    function showRegister() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('btnLogin').classList.remove('active');
        document.getElementById('btnRegister').classList.add('active');
    }

    function register() {
        const email = document.getElementById('regEmail').value.trim();
        const user = document.getElementById('regUser').value.trim();
        const pass = document.getElementById('regPass').value.trim();

        if (!email || !user || !pass) return alert("Alla fält måste fyllas i");

        localStorage.setItem('fr_email', email);
        localStorage.setItem('fr_user', user);
        localStorage.setItem('fr_pass', pass);

        alert("Konto skapat!\n\nDu kan nu logga in.");
        showLogin();
    }

    function login() {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();

        if (user === localStorage.getItem('fr_user') && pass === localStorage.getItem('fr_pass')) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            showPage('hem');
        } else {
            alert("Fel användarnamn eller lösenord");
        }
    }

    function logout() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
    }

    // Navigation
    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(page).classList.remove('hidden');

        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        const active = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.getAttribute('onclick').includes(page));
        if (active) active.classList.add('active');
    }

    // Inställningar
    function changeMap() {
        const url = document.getElementById('mapSelect').value;
        document.getElementById('mapFrame').src = url;
        localStorage.setItem('selectedMap', url);
    }

    function changeTheme() {
        const theme = document.getElementById('themeSelect').value;
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('selectedTheme', theme);
    }

    // Ladda sparade inställningar
    function loadSettings() {
        const savedMap = localStorage.getItem('selectedMap');
        if (savedMap) {
            document.getElementById('mapFrame').src = savedMap;
            document.getElementById('mapSelect').value = savedMap;
        }

        const savedTheme = localStorage.getItem('selectedTheme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeSelect').value = savedTheme;
        }
    }

    // Start
    showLogin();
    window.onload = loadSettings;
</script>

</body>
</html>
